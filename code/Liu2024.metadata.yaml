abstract: 'The brain-computer interface (BCI) is a technology that involves direct communication with parts of the brain and
  has evolved rapidly in recent years; it has begun to be used in clinical practice, such as for patient rehabilitation. Patient
  electroencephalography (EEG) datasets are critical for algorithm optimization and clinical applications of BCIs but are
  rare at present. We collected data from 50 acute stroke patients with wireless portable saline EEG devices during the performance
  of two tasks: 1) imagining right-handed movements and 2) imagining left-handed movements. The dataset consists of four types
  of data: 1) the motor imagery instructions, 2) raw recording data, 3) pre-processed data after removing artefacts and other
  manipulations, and 4) patient characteristics. This is the first open dataset to address left- and right-handed motor imagery
  in acute stroke patients.'
